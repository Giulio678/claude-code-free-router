  - model_name: qwen3.5-122b-nvidia
    litellm_params:
      model: nvidia_nim/qwen/qwen3.5-122b-a10b
      api_key: os.environ/NVIDIA_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 0
  request_timeout: 45

router_settings:
  num_retries: 0
  timeout: 45
  allowed_fails: 0
  cooldown_time: 0
