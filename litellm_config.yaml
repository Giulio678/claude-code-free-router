      model: openrouter/nousresearch/hermes-3-llama-3.1-405b:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: nousresearch/hermes-3-llama-3.1-405b:free
    litellm_params:
      model: openrouter/nousresearch/hermes-3-llama-3.1-405b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # NVIDIA NIM: non-:free models go direct to NVIDIA through this proxy.
  - model_name: kimi-k2.6
    litellm_params:
      model: nvidia_nim/moonshotai/kimi-k2.6
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: moonshotai/kimi-k2.6
    litellm_params:
      model: nvidia_nim/moonshotai/kimi-k2.6
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: mistral-medium
    litellm_params:
      model: nvidia_nim/mistralai/mistral-medium-3.5-128b
