model_list:
  # OpenRouter: only models with :free suffix.
  - model_name: qwen-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: qwen/qwen3-coder:free
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: qwen-next
    litellm_params:
      model: openrouter/qwen/qwen3-next-80b-a3b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: qwen/qwen3-next-80b-a3b-instruct:free
    litellm_params:
      model: openrouter/qwen/qwen3-next-80b-a3b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: ring
    litellm_params:
      model: openrouter/inclusionai/ring-2.6-1t:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: inclusionai/ring-2.6-1t:free
    litellm_params:
      model: openrouter/inclusionai/ring-2.6-1t:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: nemotron-free
    litellm_params:
